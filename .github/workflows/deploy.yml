name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t cygnetops/react-test -f Dockerfile.dev .

      - run: docker run -e CI=true cygnetops/react-test npm test -- --coverage

      - name: Generate deployment package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*"

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v18
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: docker-gh
          environment_name: Dockergh-env
          existing_bucket_name: elasticbeanstalk-ap-south-1-166488238950
          region: ap-south-1
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
